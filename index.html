<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VLPL</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230047AB' width='180' height='180' rx='40'/%3E%3Ctext x='90' y='115' font-family='Inter,Arial' font-size='60' font-weight='800' text-anchor='middle' fill='%23FFD100'%3EVLPL%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#001B4D 0%,#0047AB 100%);color:#fff;min-height:100vh;padding:20px}.container{max-width:900px;margin:0 auto}header{background:linear-gradient(135deg,#0047AB 0%,#001B4D 100%);padding:24px;border-radius:12px;margin-bottom:24px;box-shadow:0 8px 24px rgba(0,0,0,0.4);border:2px solid #FFD100}h1{font-size:2.5rem;font-weight:800;letter-spacing:-1px;margin-bottom:4px;color:#FFFFFF}.subtitle{font-size:1rem;color:#FFFFFF;font-weight:600;opacity:0.9}.card{background:rgba(0,27,77,0.9);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,209,0,0.3);box-shadow:0 4px 16px rgba(0,0,0,0.3)}table{width:100%;border-collapse:collapse;background:#0047AB;border-radius:8px;overflow:hidden}thead{background:#001B4D}th{padding:14px 10px;text-align:left;font-weight:700;font-size:0.85rem;color:#FFD100;text-transform:uppercase;letter-spacing:0.5px}td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.1);color:#fff;font-weight:500}tbody tr:last-child td{border-bottom:none}.pos{font-weight:800;color:#FFD100;width:40px;text-align:center}.name{font-weight:700;font-size:1rem;color:#FFFFFF}input[type="number"]{background:#001B4D;border:1px solid #0047AB;color:#fff;padding:8px;border-radius:6px;width:60px;font-family:'Inter';font-weight:600;text-align:center}button{background:#FFD100;color:#001B4D;border:none;padding:12px 24px;border-radius:8px;font-family:'Inter';font-weight:700;cursor:pointer;font-size:0.95rem}.btn-secondary{background:#0047AB;color:#fff;border:1px solid #FFD100}.controls{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:16px}.player-input{display:flex;align-items:center;gap:8px;background:#001B4D;padding:10px;border-radius:8px}.player-input label{flex:1;font-weight:700;font-size:0.95rem;color:#FFFFFF}.scores{display:flex;align-items:center;gap:8px}.score-dash{color:#FFD100;font-weight:800;font-size:1.2rem}h2{font-size:1.3rem;margin-bottom:12px;color:#FFD100}.actual-score{display:flex;align-items:center;gap:12px;margin-bottom:16px}.actual-score span{font-weight:700}</style></head>
<body><div class="container"><header><h1>VLPL</h1><div class="subtitle">Victor Luck Prediction League</div></header><div class="card"><h2>League Table</h2><table id="leagueTable"><thead><tr><th>Pos</th><th>Name</th><th>P</th><th>Pts</th></tr></thead><tbody id="tableBody"></tbody></table><div class="controls"><button onclick="exportCSV()">Export CSV</button><button class="btn-secondary" onclick="addPlayer()">Add Player</button><button class="btn-secondary" onclick="resetTable()">Reset All</button></div></div><div class="card"><h2>Game Week Scoring</h2><div class="actual-score"><span>Southend Actual:</span><input type="number" id="actualHome" placeholder="0" min="0"> <span class="score-dash">-</span> <input type="number" id="actualAway" placeholder="0" min="0"></div><div class="grid" id="predictions"></div><button onclick="calculateRound()" style="margin-top:16px;width:100%">Calculate Round</button></div><script>const defaultPlayers=[{name:'Mel',played:46,points:0},{name:'Dad',played:46,points:0},{name:'Mum',played:46,points:0},{name:'Oliver',played:46,points:0},{name:'Adam',played:46,points:0},{name:'Charlie',played:46,points:0}];let players=JSON.parse(localStorage.getItem('vlpl_players'));if(!players||players.length===0){players=defaultPlayers;localStorage.setItem('vlpl_players',JSON.stringify(players))}function save(){localStorage.setItem('vlpl_players',JSON.stringify(players))}function renderTable(){players.sort((a,b)=>b.points-a.points);const tbody=document.getElementById('tableBody');tbody.innerHTML='';players.forEach((p,i)=>{tbody.innerHTML+=`<tr><td class="pos">${i+1}</td><td class="name">${p.name}</td><td>${p.played}</td><td><strong>${p.points}</strong></td></tr>`});renderPredictions()}function renderPredictions(){const div=document.getElementById('predictions');div.innerHTML='';players.forEach((p,i)=>{div.innerHTML+=`<div class="player-input"><label>${p.name}</label><div class="scores"><input type="number" id="predH${i}" placeholder="0" min="0"><span class="score-dash">-</span><input type="number" id="predA${i}" placeholder="0" min="0"></div></div>`})}function calculateRound(){const ah=parseInt(document.getElementById('actualHome').value);const aa=parseInt(document.getElementById('actualAway').value);if(isNaN(ah)||isNaN(aa)){alert('Enter actual score first');return}const actualResult=ah>aa?'H':ah<aa?'A':'D';players.forEach((p,i)=>{const ph=parseInt(document.getElementById(`predH${i}`).value);const pa=parseInt(document.getElementById(`predA${i}`).value);if(isNaN(ph)||isNaN(pa))return;const predResult=ph>pa?'H':ph<pa?'A':'D';let pts=0;if(ph===ah&&pa===aa){pts=3}else if(predResult===actualResult){pts=1}p.points+=pts;p.played++;document.getElementById(`predH${i}`).value='';document.getElementById(`predA${i}`).value=''});document.getElementById('actualHome').value='';document.getElementById('actualAway').value='';save();renderTable()}function addPlayer(){const name=prompt('Player name:');if(name){players.push({name,played:46,points:0});save();renderTable()}}function exportCSV(){let csv='Pos,Name,P,Pts\n';players.forEach((p,i)=>{csv+=`${i+1},${p.name},${p.played},${p.points}\n`});const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='VLPL.csv';a.click()}function resetTable(){if(confirm('Reset all points to 0?')){players.forEach(p=>{p.points=0;p.played=46});save();renderTable()}}renderTable()</script></body></html>
